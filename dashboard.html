<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro - TRANS CK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135px, #0a0e2a 0%, #152042 100%); margin: 0; padding: 15px; color: #ffffff; min-height: 100vh; }
        .card { background: #1a2549; border-radius: 25px; padding: 25px; max-width: 500px; margin: 20px auto; border: 1px solid #324a87; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #4dabf7; text-align: center; margin-bottom: 25px; font-size: 26px; }
        label { display: block; margin-top: 18px; font-weight: bold; color: #a1b1d4; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin-top: 7px; border: 2px solid #324a87; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #222d56; color: white; transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: #4dabf7; box-shadow: 0 0 10px rgba(77, 171, 247, 0.4); }
        .fila-flex { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 7px; }
        .fila-flex input { flex: 1 1 calc(50% - 6px); min-width: 120px; }
        
        .seccion-productos { background: #152042; padding: 20px; border-radius: 18px; margin-top: 15px; border: 2px dashed #324a87; }
        .fila-producto { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; align-items: center; border-bottom: 1px solid #324a87; padding-bottom: 12px; }
        .fila-producto:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .in-carga { flex: 2 1 100%; }
        .in-cant, .in-precio { flex: 1 1 70px; }
        .btn-del { flex: 0 0 45px; height: 45px; background: #ff5252; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-del:active { transform: scale(0.9); background: #e04a4a; }
        
        .btn-main { width: 100%; background: #4dabf7; color: #0a0e2a; padding: 18px; border: none; border-radius: 15px; margin-top: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(77, 171, 247, 0.3); }
        .btn-main:active { transform: scale(0.97); background: #3bc9db; }
        .btn-volver { display: block; text-align: center; margin-bottom: 20px; color: #a1b1d4; text-decoration: none; font-size: 15px; font-weight: bold; }
        .btn-volver:active { color: #4dabf7; }
    </style>
</head>
<body>
    <div class="card">
        <a href="menu.html" class="btn-volver">← Volver al Menú</a>
        <h2>Nuevo Registro de Viaje</h2>
        
        <label>Vehículo y Personal</label>
        <select><option>Seleccionar Camión</option></select>
        <input type="text" placeholder="Remitente">
        <input type="text" placeholder="Consignatario">
        
        <div class="fila-flex">
            <input type="text" placeholder="Origen">
            <input type="text" placeholder="Destino">
        </div>

        <label>Detalle de Carga / Flete</label>
        <div class="seccion-productos">
            <div class="fila-producto">
                <input type="text" class="in-carga" placeholder="Carga/Producto">
                <input type="number" class="in-cant" placeholder="Cant.">
                <input type="number" class="in-precio" placeholder="Bs/U.">
                <button class="btn-del" type="button">×</button>
            </div>
        </div>

        <label>Gastos Operativos</label>
        <div class="fila-flex">
            <input type="number" placeholder="Diésel (Bs)">
            <input type="number" placeholder="Peajes (Bs)">
            <input type="number" placeholder="Otros Gastos">
        </div>

        <button type="button" class="btn-main">REGISTRAR VIAJE</button>
    </div>
</body>
</html>
