<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #1f2937; --amarillo: #facc15; --blanco: #ffffff; }
        
        body { 
            margin: 0; background: var(--fondo); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* BARRA LATERAL FLOTANTE */
        .sidebar {
            position: absolute; left: 0; top: 0;
            width: 70px; background: var(--blanco); height: 100%;
            display: flex; flex-direction: column; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; z-index: 1000;
            box-shadow: 4px 0 15px rgba(0,0,0,0.3);
        }

        .sidebar:hover, .sidebar:active { width: 280px; }

        /* ICONOS CON LA MISMA ANIMACIÓN QUE LAS LETRAS */
        .menu-item {
            display: flex; align-items: center;
            text-decoration: none; color: #4b5563;
            padding: 20px 22px; min-width: 280px;
            transition: all 0.2s;
            
            /* Aplicamos la misma animación de las letras */
            animation: aparecerTodo 1.2s ease-out forwards;
            opacity: 0;
        }

        /* EFECTO DE CLIC */
        .menu-item:active { transform: scale(0.96); background: #f3f4f6; }

        .icon { min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 26px; height: 26px; stroke-width: 2; }

        .label {
            margin-left: 20px; font-weight: 700; font-size: 14px;
            white-space: nowrap; opacity: 0; transition: 0.2s;
            text-transform: uppercase;
        }
        .sidebar:hover .label, .sidebar:active .label { opacity: 1; }

        /* CONTENIDO CENTRAL */
        .main-content {
            flex: 1; display: flex; align-items: center; justify-content: center;
            text-align: center; width: 100%; padding-left: 70px;
            box-sizing: border-box;
        }

        .main-content h1 {
            color: var(--amarillo); font-size: 12vw; font-weight: 800;
            line-height: 0.9; margin: 0; text-transform: uppercase;
            letter-spacing: -2px;
            /* Misma animación que los iconos */
            animation: aparecerTodo 1.2s ease-out forwards;
        }

        /* ANIMACIÓN UNIFICADA (Iconos y Letras) */
        @keyframes aparecerTodo {
            0% { 
                opacity: 0; 
                transform: translateY(40px); 
                filter: blur(8px); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0); 
                filter: blur(0); 
            }
        }

        /* Pequeño retraso para que los iconos no salgan todos al mismo tiempo */
        .menu-item:nth-child(2) { animation-delay: 0.1s; }
        .menu-item:nth-child(3) { animation-delay: 0.2s; }
        .menu-item:nth-child(4) { animation-delay: 0.3s; }
        .menu-item:nth-child(5) { animation-delay: 0.4s; }
        .menu-item:last-child { animation-delay: 0.6s; }

    </style>
</head>
