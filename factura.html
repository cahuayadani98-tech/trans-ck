<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Factura TRANS CK</title>
    <style>
        body { font-family: 'Courier New', monospace; padding: 30px; display: flex; justify-content: center; }
        .invoice-box { width: 100%; max-width: 500px; border: 2px solid #333; padding: 25px; background: white; }
        .header { text-align: center; border-bottom: 2px dashed #333; padding-bottom: 15px; margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; }
        .total { font-size: 22px; font-weight: bold; border-top: 2px solid #333; padding-top: 10px; margin-top: 20px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="invoice-box">
        <div class="header">
            <h2>TRANS CK LOGÍSTICA</h2>
            <p>Servicio de Transporte Pesado</p>
        </div>
        <div class="row"><span>Fecha:</span> <span id="fechaActual"></span></div>
        <div class="row"><span>Cliente:</span> <span>____________________</span></div>
        <hr>
        <div class="row">
            <span>Servicio de Flete</span>
            <span>Bs. <input type="number" id="montoFactura" style="width:80px; font-family:inherit; border:none; border-bottom:1px solid #000;" placeholder="0.00"></span>
        </div>
        <div class="total">
            <span>TOTAL A PAGAR:</span>
            <span id="totalDisplay">Bs. 0.00</span>
        </div>
        <div style="margin-top:40px; text-align:center;">
            <p>__________________________</p>
            <p>Firma del Transportista</p>
        </div>
        <button class="no-print" onclick="window.print()" style="margin-top:20px; width:100%; padding:10px;">IMPRIMIR FACTURA</button>
        <button class="no-print" onclick="location.href='menu.html'" style="margin-top:10px; width:100%; padding:10px; background:#ddd; border:none;">VOLVER</button>
    </div>

    <script>
        document.getElementById('fechaActual').innerText = new Date().toLocaleDateString();
        document.getElementById('montoFactura').oninput = function() {
            document.getElementById('totalDisplay').innerText = "Bs. " + (this.value || "0.00");
        };
    </script>
</body>
</html>
