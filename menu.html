<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #2a3b4e; --gris: #f4f7f6; --rojo: #e74c3c; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--gris); display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; margin-bottom: 30px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 450px; }
        .card { background: white; padding: 25px 10px; border-radius: 24px; text-decoration: none; display: flex; flex-direction: column; align-items: center; box-shadow: 0 8px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
        .icon { width: 60px; height: 60px; background: #f1f5f9; border-radius: 20px; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; font-size: 28px; }
        span { font-weight: 700; color: var(--azul); font-size: 15px; }
        .btn-exit { margin-top: 50px; width: 100%; max-width: 450px; padding: 16px; background: none; border: 2px solid var(--rojo); color: var(--rojo); border-radius: 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Panel Principal</h1>
        <p style="color:#7f8c8d; margin:5px 0 0;">TRANS CK Logística</p>
    </div>
    <div class="grid">
        <a href="camiones.html" class="card"><div class="icon">🚚</div><span>Camiones</span></a>
        <a href="guias.html" class="card"><div class="icon">📝</div><span>Registro</span></a>
        <a href="factura.html" class="card"><div class="icon">💵</div><span>Factura</span></a>
        <a href="reportes.html" class="card"><div class="icon">📈</div><span>Reportes</span></a>
    </div>
    <button class="btn-exit" onclick="location.href='index.html'">Cerrar Sesión</button>
</body>
</html>
