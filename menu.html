<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2a3b4e; --accent: #8ac9d8; --success: #2ecc71; --danger: #e74c3c; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header-container { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .header h1 { margin: 0; color: var(--primary); font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .header span { color: var(--accent); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .btn-logout { background: #ffeaea; color: var(--danger); border: none; padding: 10px 15px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; }
        .menu-grid { width: 100%; max-width: 400px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card-full { grid-column: span 2; }
        .menu-card { background: white; padding: 25px 15px; border-radius: 24px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(42, 59, 78, 0.06); border: 1px solid rgba(255,255,255,0.8); transition: all 0.3s ease; }
        .menu-card:active { transform: scale(0.95); }
        .icon-bg { width: 50px; height: 50px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 12px; }
        .card-title { font-size: 13px; font-weight: 800; color: var(--primary); text-transform: uppercase; text-align: center; }
        .bg-green { background: #e8f9f1; color: var(--success); }
        .bg-yellow { background: #fef9e7; color: #b7950b; }
        .bg-accent { background: #f0f7f9; color: var(--accent); }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="header"><span>Panel de Control</span><h1>TRANS CK</h1></div>
        <button class="btn-logout" id="btnLogout">🚪 SALIR</button>
    </div>
    <div class="menu-grid">
        <a href="guias.html" class="menu-card card-full" style="background: linear-gradient(135deg, var(--primary), #455a71);">
            <div class="icon-bg" style="background: rgba(255,255,255,0.1); color: white;">➕</div>
            <div class="card-title" style="color: white; font-size: 16px;">Nuevo Registro de Carga</div>
        </a>
        <a href="ver_guia.html" class="menu-card"><div class="icon-bg bg-accent">🚚</div><div class="card-title">Imprimir Guía</div></a>
        <a href="factura.html" class="menu-card"><div class="icon-bg bg-green">📄</div><div class="card-title">Imprimir Factura</div></a>
        <a href="reportes.html" class="menu-card card-full"><div class="icon-bg bg-yellow">📊</div><div class="card-title">Reportes y Excel Detallado</div></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE", authDomain: "registro-8f26e.firebaseapp.com", projectId: "registro-8f26e", appId: "1:62551766112:web:e59e4b444591a0e7737f05" };
        const auth = getAuth(initializeApp(firebaseConfig));
        
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        document.getElementById('btnLogout').onclick = () => { if(confirm("¿Cerrar sesión?")) signOut(auth).then(() => window.location.href="index.html"); };
    </script>
</body>
</html>
