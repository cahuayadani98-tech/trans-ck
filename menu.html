<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú - TRANS CK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135px, #0a0e2a 0%, #152042 100%); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; color: #ffffff; min-height: 100vh; }
        h1 { color: #4dabf7; margin-top: 20px; font-size: 32px; letter-spacing: 2px; }
        p.subtitle { color: #a1b1d4; margin-bottom: 30px; font-size: 16px; }
        .container { width: 100%; max-width: 500px; margin-top: 30px; flex-grow: 1; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .btn-menu { background: #1a2549; padding: 35px 15px; border-radius: 20px; text-decoration: none; color: #ffffff; font-weight: bold; display: flex; flex-direction: column; align-items: center; border: 2px solid #324a87; transition: 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-menu span { margin-top: 10px; font-size: 16px; }
        /* Efecto de iluminación al tocar */
        .btn-menu:active { transform: scale(0.95); border-color: #4dabf7; box-shadow: 0 0 15px rgba(77, 171, 247, 0.7); }
        .icon-img { width: 50px; height: 50px; margin-bottom: 5px; }
        .btn-salir { margin-top: 50px; margin-bottom: 30px; padding: 15px 30px; background: #ff5252; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 16px; transition: 0.3s; box-shadow: 0 5px 10px rgba(255, 82, 82, 0.3); }
        .btn-salir:active { transform: scale(0.95); background: #e04a4a; }
    </style>
</head>
<body>
    <h1>TRANS CK</h1>
    <p class="subtitle">Panel de Control</p>
    
    <div class="container">
        <div class="menu-grid">
            <a href="dashboard.html" class="btn-menu">
                <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Objects/Memo.png" alt="Memo" class="icon-img">
                <span>Registro</span>
            </a>
            <a href="camiones.html" class="btn-menu">
                <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Travel%20%26%20Places/Articulated%20Lorry.png" alt="Articulated Lorry" class="icon-img">
                <span>Camiones</span>
            </a>
            <a href="factura.html" class="btn-menu">
                <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Objects/Page%20Facing%20Up.png" alt="Page Facing Up" class="icon-img">
                <span>Facturas</span>
            </a>
            <a href="guia.html" class="btn-menu">
                <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Objects/Package.png" alt="Package" class="icon-img">
                <span>Guías</span>
            </a>
        </div>
    </div>
    
    <a href="index.html" class="btn-salir">Cerrar Sesión</a>
</body>
</html>
