<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Logístico - TRANS CK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; padding: 15px; color: #2a3b4e; margin: 0; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .btn { padding: 12px 18px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .btn-excel { background: #27ae60; color: white; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn-back { background: #537d8f; color: white; text-decoration: none; }

        .summary-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 15px 0; text-align: center; border-bottom: 5px solid #2ecc71; }
        .monto-total { font-size: 30px; color: #2ecc71; font-weight: 800; margin-top: 5px; }

        .table-wrapper { background: white; border-radius: 20px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #2a3b4e; color: white; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="menu.html" class="btn btn-back">← Volver</a>
        <button class="btn btn-excel" id="exportarExcel">Generar Excel</button>
    </div>

    <div class="summary-card">
        <span style="color: #7f8c8d; font-weight: 600;">VALOR TOTAL DE CARGAS (Bs.)</span>
        <div class="monto-total" id="montoAcumulado">Bs. 0.00</div>
    </div>

    <div class="table-wrapper">
        <table id="tablaMaestra">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>N° Guía</th>
                    <th>N° Factura</th>
                    <th>Remitente</th>
                    <th>Consignatario</th>
                    <th>Destino</th>
                    <th>Total (Bs.)</th>
                </tr>
            </thead>
            <tbody id="datosTabla">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
            authDomain: "registro-8f26e.firebaseapp.com",
            projectId: "registro-8f26e",
            appId: "1:62551766112:web:e59e4b444591a0e7737f05"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Escuchar cambios en Firebase
        onSnapshot(query(collection(db, "servicios"), orderBy("fecha", "desc")), (snapshot) => {
            const tabla = document.getElementById('datosTabla');
            let acumulado = 0;
            tabla.innerHTML = "";

            snapshot.forEach(doc => {
                const item = doc.data();
                acumulado += item.total || 0;
                
                const fecha = new Date(item.fecha).toLocaleDateString();

                tabla.innerHTML += `
                    <tr>
                        <td>${fecha}</td>
                        <td><b>${item.nroGuia || '-'}</b></td>
                        <td>${item.nroFactura || '-'}</td>
                        <td>${item.remitente || '-'}</td>
                        <td>${item.consignatario || '-'}</td>
                        <td>${item.destino || '-'}</td>
                        <td style="color:#27ae60; font-weight:700;">Bs. ${(item.total || 0).toFixed(2)}</td>
                    </tr>
                `;
            });

            document.getElementById('montoAcumulado').innerText = `Bs. ${acumulado.toFixed(2)}`;
        });

        // Función para descargar Excel Profesional
        document.getElementById('exportarExcel').onclick = () => {
            const table = document.getElementById("tablaMaestra");
            const wb = XLSX.utils.table_to_book(table, { sheet: "TRANS CK LOGISTICA" });
            const fechaHoy = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Reporte_General_TRANS_CK_${fechaHoy}.xlsx`);
        };
    </script>
</body>
</html>
