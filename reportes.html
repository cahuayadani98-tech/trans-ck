<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Contable - TRANS CK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .stats { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; border-bottom: 4px solid #2ecc71; }
        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { background: #2a3b4e; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        .btn-excel { background: #27ae60; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>
    <button onclick="location.href='menu.html'">← Menú</button>
    <h2>Reporte de Movimientos</h2>

    <div class="stats">
        <small>INGRESOS TOTALES</small>
        <h1 id="totalIngresos">Bs. 0.00</h1>
    </div>

    <button class="btn-excel" id="btnExcel">DESCARGAR EXCEL PROFESIONAL</button>

    <table id="tablaReporte">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>N° Guía</th>
                <th>N° Factura</th>
                <th>Cliente</th>
                <th>Destino</th>
                <th>Total (Bs.)</th>
            </tr>
        </thead>
        <tbody id="cuerpo"></tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
            authDomain: "registro-8f26e.firebaseapp.com",
            projectId: "registro-8f26e",
            appId: "1:62551766112:web:e59e4b444591a0e7737f05"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(query(collection(db, "servicios"), orderBy("fecha", "desc")), (snap) => {
            const cuerpo = document.getElementById('cuerpo');
            let totalGeneral = 0;
            cuerpo.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                totalGeneral += d.total;
                cuerpo.innerHTML += `
                    <tr>
                        <td>${new Date(d.fecha).toLocaleDateString()}</td>
                        <td>${d.nroGuia || '-'}</td>
                        <td>${d.nroFactura || '-'}</td>
                        <td>${d.cliente}</td>
                        <td>${d.destino}</td>
                        <td><b>Bs. ${d.total.toFixed(2)}</b></td>
                    </tr>
                `;
            });
            document.getElementById('totalIngresos').innerText = `Bs. ${totalGeneral.toFixed(2)}`;
        });

        document.getElementById('btnExcel').onclick = () => {
            const table = document.getElementById("tablaReporte");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Reporte_TRANS_CK.xlsx");
        };
    </script>
</body>
</html>
